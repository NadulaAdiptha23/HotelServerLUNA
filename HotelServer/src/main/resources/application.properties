# ---------------------------------------------------------------------------
# Email (reservation + payment confirmation messages)
# ---------------------------------------------------------------------------
# Works out of the box with a free Gmail account:
#   1. Turn on 2-Step Verification on the Google account you want to send from.
#   2. Create an "App Password" at https://myaccount.google.com/apppasswords
#   3. Set MAIL_USERNAME / MAIL_APP_PASSWORD as environment variables before
#      starting the app (do NOT commit real credentials into this file):
#        export MAIL_USERNAME=yourname@gmail.com
#        export MAIL_APP_PASSWORD=xxxxxxxxxxxxxxxx
#   4. To disable emails entirely (e.g. offline demo), set:
#        export LUNA_MAIL_ENABLED=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
luna.mail.enabled=${LUNA_MAIL_ENABLED:true}
