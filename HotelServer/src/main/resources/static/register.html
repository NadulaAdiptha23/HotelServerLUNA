<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Cove | Create Account</title>
    <script src="server-redirect.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body class="auth-page">

<div class="page-veil"><div class="page-veil-mark">LUNA COVE<div class="page-veil-bar"></div></div></div>

<div class="auth-bg" style="background-image: url('image/62eb95a0ae66428fb3940423634474e4.jpg');"></div>
<div class="auth-scrim"></div>

<div class="auth-topbar">
    <a class="nav-brand" href="index.html" aria-label="Luna Cove home">
        <span class="brand-title">LUNA COVE</span>
    </a>
    <a class="auth-back-home" href="index.html">&larr; Back to home</a>
</div>

<main class="auth-shell glass-card scale-in" style="margin-top: var(--space-lg);">
    <p class="eyebrow">Create Account</p>
    <h1>Join The Estate</h1>
    <p class="auth-sub">Register a private guest profile for swift access to dining scheduling, seating preferences, and curated orders.</p>

    <form id="registerForm" novalidate>
        <div class="form-field-float">
            <input id="registerName" type="text" placeholder=" " autocomplete="name" required>
            <label for="registerName">Full Name</label>
            <span class="field-error"></span>
        </div>

        <div class="form-field-float">
            <input id="registerEmail" type="email" placeholder=" " autocomplete="email" required>
            <label for="registerEmail">Email Address</label>
            <span class="field-error"></span>
        </div>

        <div class="form-field-float">
            <input id="registerPassword" type="password" placeholder=" " autocomplete="new-password" required>
            <label for="registerPassword">Password</label>
            <span class="field-error"></span>
            <div class="password-strength">
                <div class="strength-bar"><div class="strength-bar-fill" id="strengthFill"></div></div>
                <span class="strength-label" id="strengthLabel"></span>
            </div>
        </div>

        <div class="form-field-float">
            <input id="registerConfirmPassword" type="password" placeholder=" " autocomplete="new-password" required>
            <label for="registerConfirmPassword">Confirm Password</label>
            <span class="field-error"></span>
        </div>

        <div class="checkbox-row" style="margin-bottom: var(--space-lg);">
            <input type="checkbox" id="agreeTerms">
            <label for="agreeTerms">I agree to the reservation & dining terms</label>
        </div>

        <button class="btn btn-primary btn-block" type="submit">Register Guest</button>
    </form>

    <div class="auth-switch">
        Already registered? <a href="login.html">Sign in instead</a>
    </div>
</main>

<script src="assets/js/common.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
